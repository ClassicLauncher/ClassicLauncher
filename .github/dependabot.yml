version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # commonmark-java 0.21.0 is pinned at the last Java 8-compatible release.
      # 0.22.0+ targets Java 11 bytecode (class file major version 55) which is
      # incompatible with the project's Java 8 compiler target.
      - dependency-name: "org.commonmark:commonmark"
      # JUnit 6 requires Java 17 at runtime and introduces breaking API changes.
      # Project targets Java 8 bytecode; stay on JUnit 5.x until a migration is planned.
      - dependency-name: "org.junit.jupiter:junit-jupiter"
        versions: [">= 6.0.0"]
    groups:
      all-dependencies:
        patterns:
          - "*"
