name: Release

# Builds platform-native installers and a fat JAR on every version tag push,
# publishes the JAR to the ClassicLauncher Maven repository, and creates a
# GitHub Release with all artifacts attached.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Build all native artifacts via reusable workflow
  # ─────────────────────────────────────────────────────────────────────────────
  version:
    name: Extract version
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.extract.outputs.number }}
    steps:
      - name: Strip v prefix
        id: extract
        run: echo "number=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: version
    if: always()
    uses: ./.github/workflows/native-build-reusable.yml
    with:
      version: ${{ needs.version.outputs.number || '' }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish JAR to ClassicLauncher Repo
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to ClassicLauncher repo
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: classiclauncher
          server-username: CLASSICLAUNCHER_USERNAME
          server-password: CLASSICLAUNCHER_PASSWORD

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: mvn versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false -q

      - name: Deploy to ClassicLauncher repo
        run: mvn deploy -DskipTests -Dspotless.check.skip=true -q
        env:
          CLASSICLAUNCHER_USERNAME: ${{ secrets.CLASSICLAUNCHER_USERNAME }}
          CLASSICLAUNCHER_PASSWORD: ${{ secrets.CLASSICLAUNCHER_PASSWORD }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect breaking change notes
        id: breaking
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "body=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOTES=""
          while IFS= read -r pr_number; do
            [ -z "$pr_number" ] && continue
            BODY=$(gh pr view "$pr_number" --json body --jq '.body')
            # Extract the "## Breaking Changes" section (everything until the next ## heading or end)
            SECTION=$(echo "$BODY" | sed -n '/^## Breaking Changes/,/^## /{ /^## Breaking Changes/d; /^## /d; p; }')
            if [ -n "$SECTION" ]; then
              NOTES="${NOTES}### PR #${pr_number}
          ${SECTION}

          "
            fi
          done <<< "$(gh pr list --state merged --label breaking --search "merged:>=$(git log -1 --format=%aI "$PREV_TAG")" --json number --jq '.[].number')"

          if [ -n "$NOTES" ]; then
            FULL_NOTES="## Breaking Changes

          ${NOTES}---

          "
          else
            FULL_NOTES=""
          fi

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          {
            echo "body<<${EOF_MARKER}"
            echo "$FULL_NOTES"
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.breaking.outputs.body }}
          generate_release_notes: true
          files: |
            artifacts/jar-jdk8/*.jar
            artifacts/macos-dmg/*.dmg
            artifacts/windows-msi/*.msi
            artifacts/linux-deb/*.deb
            artifacts/linux-rpm/*.rpm
