name: Native Build (Reusable)

# Reusable workflow that builds platform-native installers (macOS DMG, Windows MSI,
# Linux DEB/RPM) and a plain runnable fat JAR.
#
# Artifacts produced:
#   jar-jdk8    — plain fat JAR (Java 8 compiled, runs on any JRE 8+)
#   macos-dmg   — macOS disk image with bundled JRE 24
#   windows-msi — Windows installer with bundled JRE 24
#   linux-deb   — Debian package with bundled JRE 24
#   linux-rpm   — RPM package with bundled JRE 24

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string to set (e.g. 1.0.1). Leave empty to use pom.xml default.'
        required: false
        type: string
        default: ''
      artifact-retention-days:
        description: 'Number of days to retain build artifacts'
        required: false
        type: number
        default: 90
      ref:
        description: 'Git ref to checkout (branch, tag, or SHA). Defaults to the triggering ref.'
        required: false
        type: string
        default: ''

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Plain runnable fat JAR (Java 8 source, runs on any JRE 8+)
  # ─────────────────────────────────────────────────────────────────────────────
  jar-jdk8:
    name: Fat JAR (JDK 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Set version
        if: inputs.version != ''
        run: mvn versions:set -DnewVersion="${{ inputs.version }}" -DgenerateBackupPoms=false -q

      - name: Build fat JAR
        run: mvn package -Dmaven.test.skip=true -Dspotless.check.skip=true -q

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-jdk8
          path: target/ClassicLauncher-*.jar
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS DMG (JDK 24, bundles JRE 24)
  # ─────────────────────────────────────────────────────────────────────────────
  macos:
    name: macOS DMG (JDK 24)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Set version
        if: inputs.version != ''
        run: mvn versions:set -DnewVersion="${{ inputs.version }}" -DgenerateBackupPoms=false -q

      - name: Build fat JAR
        run: mvn package -DskipTests -Dspotless.check.skip=true -q

      - name: Build macOS DMG
        run: |
          mvn package -Pnative \
            -Djpackage.type=dmg \
            -Djpackage.resourceDir=packaging/macos \
            -DskipTests -Dspotless.check.skip=true -q

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/installer/*.dmg
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows MSI (JDK 24, bundles JRE 24)
  # ─────────────────────────────────────────────────────────────────────────────
  windows:
    name: Windows MSI (JDK 24)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Install WiX Toolset
        run: choco upgrade wixtoolset -y --no-progress
        shell: pwsh
        continue-on-error: true

      - name: Add WiX to PATH
        run: |
          $wixDir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" -ErrorAction SilentlyContinue |
            Sort-Object Name -Descending | Select-Object -First 1
          if ($wixDir) {
            "$($wixDir.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
        shell: pwsh

      - name: Set version
        if: inputs.version != ''
        run: |
          mvn versions:set "-DnewVersion=${{ inputs.version }}" -DgenerateBackupPoms=false -q
        shell: bash

      - name: Build fat JAR
        run: mvn package -DskipTests -Dspotless.check.skip=true -q
        shell: bash

      - name: Build Windows MSI
        run: |
          mvn package -Pnative \
            -Djpackage.type=msi \
            -Djpackage.resourceDir=packaging/windows \
            -DskipTests -Dspotless.check.skip=true -q
        shell: bash

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/installer/*.msi
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux DEB + RPM (JDK 24, bundles JRE 24)
  # ─────────────────────────────────────────────────────────────────────────────
  linux:
    name: Linux DEB + RPM (JDK 24)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm

      - name: Set version
        if: inputs.version != ''
        run: mvn versions:set -DnewVersion="${{ inputs.version }}" -DgenerateBackupPoms=false -q

      - name: Build fat JAR
        run: mvn package -DskipTests -Dspotless.check.skip=true -q

      - name: Build Linux DEB
        run: |
          mvn package -Pnative \
            -Djpackage.type=deb \
            -Djpackage.resourceDir=packaging/linux \
            -DskipTests -Dspotless.check.skip=true -q

      - name: Build Linux RPM
        run: |
          mvn package -Pnative \
            -Djpackage.type=rpm \
            -Djpackage.resourceDir=packaging/linux \
            -DskipTests -Dspotless.check.skip=true -q

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: target/installer/*.deb
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Upload Linux RPM
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: target/installer/*.rpm
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
